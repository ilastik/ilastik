{% set setup_py_data = load_setup_py_data(setup_file='../conda-build-setup.py', from_recipe_dir=True) %}
{% set version = setup_py_data.version %}


{% set PYTHON = PYTHON | default("$PYTHON") %}

package:
  name: ilastik-package-meta-recipe
  version: {{version}}

source:
  path: ..


outputs:
  - name: ilastik-core

    build:
      number: 0
      noarch: python
      script_env:
        - SETUPTOOLS_SCM_PRETEND_VERSION={{version}}
      script:
        - {{PYTHON}} -m pip install . --no-deps -vv
    requirements:
      host:
        - python >=3.10
        - pip
        - setuptools >=64.0
        - setuptools_scm >=6.2
      run:
        - python >=3.10
        - numpy >=1.25
        # aiohttp to enable zarr.storage.FSStore
        - aiohttp
        - cachetools
        - certifi
        - dpct
        - fastfilters
        # fsspec to enable zarr.storage.FSStore
        - fsspec
        - future
        - greenlet
        - grpcio !=1.42.*
        - h5py
        - hytra >=1.2.1
        - ilastik-feature-selection
        - ilastikrag >=0.1.4
        - ilastik-carving-tools
        - jsonschema
        - mamutexport
        - marching_cubes
        - ndstructs
        - nifty >=1.2.3
        - pandas 2.*
        - platformdirs
        - psutil
        - pydantic >2.10,<3
        - pyopengl
        - pyqt 5.15.*
        # pyqtgraph 0.14.0 results in non-functional 3dvp on win, no mesh display on mac
        - pyqtgraph <0.14
        # previous versions would set thread limits globally with side effects
        # 0.9 breaks compatibility and results in test failures
        - python-elf >=0.4.8,<0.9
        # for neuroglancer precomputed chunks
        - requests
        # s3fs allows zarr.storage.FSStore to read s3:// URIs
        - s3fs >=2022.8.2
        - scikit-image
        # There seems to be a problem with scikit-learn 1.7.0, test testContourMWTExport breaks
        - scikit-learn <=1.6.1
        - tifffile >=2022
        - vigra 1.12.3
        - xarray !=2023.8.0,!=2023.9.0,!=2023.10.0
        - z5py 2.*
        - zarr 2.*
        # Third-party object feature plugins
        - sphericaltexture_plugin 0.1.0
      run_constrained:
        - tiktorch 26.5.0
        # TODO: investigate pytorch-3dunet dependency changes 1.9.3 and up #3079
        - pytorch-3dunet 1.9.2
        - volumina >=1.3.24
        # TODO: sphericaltexture 0.1.1 currently times out in the tests
        - sphericaltexture 0.0.4
        # pyshtools 4.10 conflicts with pytorch via openmp on windows
        - pyshtools >=4.12

    test:
      imports:
        - ilastik
        - ilastik.experimental
        - ilastik.config
        - ilastik.applets
        - ilastik.workflows
        - lazyflow

      source_files:
        - ilastik
        - lazyflow
        - tests
        - pytest.ini

      requires:
        - python 3.13
        - pytest >4
        - pytest-qt
        - volumina

      commands:
        - pytest -v

    about:
      home: https://github.com/ilastik/ilastik
      license: LGPL-2.1-or-later
      summary: >
        ilastik-core package enables ilastik-api usage to mix into environments.
        ilastik is a simple, user-friendly tool for interactive image classification,
        segmentation and analysis.


  - name: ilastik
    build:
      noarch: python
      entry_points:
        - ilastik = ilastik_scripts.ilastik_startup:main
    requirements:
      run:
        - python 3.13.*
        - {{ pin_subpackage("ilastik-core", exact=True) }}
        - pytorch >=2
        - tiktorch
        - torchvision
        - volumina

    test:
      source_files:
        - ilastik
        - lazyflow
        - tests
        - pytest.ini

      requires:
        - pytest >4
        - pytest-qt
        - pytorch 2.*

      imports:
        - ilastik
        - ilastik.experimental
        - ilastik.config
        - ilastik.applets
        - ilastik.workflows
        - lazyflow
        - tiktorch

      commands:
        - ilastik --help
        - pytest -v

    about:
      home: https://github.com/ilastik/ilastik
      license: LGPL-2.1-or-later
      summary: >
        ilastik conda package to create ilastik gui environments.
        ilastik is a simple, user-friendly tool for interactive image classification,
        segmentation and analysis.


  - name: ilastik-gpu
    build:
      noarch: python
      entry_points:
        - ilastik = ilastik_scripts.ilastik_startup:main
    requirements:
      run:
        - python 3.13.*
        - {{ pin_subpackage("ilastik-core", exact=True) }}
        - pytorch >=2
        - pytorch *=*cuda*
        - tiktorch
        - torchvision
        - volumina
        # Third-party object feature plugins
        - sphericaltexture_plugin

    test:
      source_files:
        - ilastik
        - lazyflow
        - tests
        - pytest.ini

      requires:
        - pytest >4
        - pytest-qt
        - pytorch 2.*

      imports:
        - ilastik
        - ilastik.experimental
        - ilastik.config
        - ilastik.applets
        - ilastik.workflows
        - lazyflow
        - tiktorch
        - torch
        - vigra

      commands:
        - ilastik --help
        - pytest -v

    about:
      home: https://github.com/ilastik/ilastik
      license: LGPL-2.1-or-later
      summary: >
        ilastik conda package to create ilastik gpu-enabled gui environments.
        ilastik is a simple, user-friendly tool for interactive image classification,
        segmentation and analysis.
